<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Comunidade ReFaxion</title>

    <link rel="stylesheet" href="css/feed.css">

    <link rel="icon" href="assets/logo.png">
    
</head>

<body>

    <header class="topbar">

        <div class="brand">

    <img
        src="assets/logo.png"
        alt="Logo ReFaxion"
        class="logo"
    >

    <div class="brand-text">

        <h2>
            Comunidade ReFaxion
        </h2>

        <p class="brand-subtitle">
            Compartilhe suas transformações sustentáveis
        </p>

    </div>

</div>

        <button
            class="back-btn"
            onclick="window.location.href='index.html'"
        >
            ← Voltar
        </button>

    </header>

    <main>

        <section class="publicar-card">

            <h2>
                Compartilhe seu resultado
            </h2>

            <p>
                Mostre para a comunidade como você reutilizou sua peça.
            </p>

            <input
                type="file"
                id="novaImagem"
                accept="image/*"
            >

            <textarea
                id="novoTexto"
                placeholder="Conte sua experiência..."
            ></textarea>

            <button onclick="publicar()">
                Publicar
            </button>
<!--
            <button
                class="danger-btn"
                onclick="limparPosts()"
            >
                Limpar Posts de Teste
            </button>
-->
        </section>

        <section class="feed-title">

            <h2>
                🌎 Inspirações da Comunidade
            </h2>

            <p>
                Veja como outras pessoas reaproveitaram suas roupas.
            </p>

        </section>

        <div id="feed"></div>

    </main>

    <script src="js/feed.js"></script>

</body>

</html>
