<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Comunidade | ReFaxion</title>

    <link rel="icon" href="assets/logo.png">

    <link rel="stylesheet" href="css/feed.css">

    <script src="js/auth.js"></script>

    <script>

        verificarLogin();

    </script>

</head>

<body>

<header class="topbar">

    <div class="brand">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Logo ReFaxion"
        >

        <div class="brand-text">

            <h1>ReFaxion</h1>

            <span class="brand-subtitle">

                Comunidade sustentável

            </span>

        </div>

    </div>

    <div class="menu">

        <span id="usuarioNome"></span>

        <button
            class="back-btn"
            onclick="window.location.href='index.html'"
        >

            🤖 Voltar para IA

        </button>

        <button
            class="logout-btn"
            onclick="logout()"
        >

            🚪 Sair

        </button>

    </div>

</header>

<main>

    <!-- ==========================
         PUBLICAR
    =========================== -->

    <section class="publicar-card">

        <h2>

            📢 Compartilhar com a comunidade

        </h2>

        <p>

            Compartilhe sua roupa reaproveitada ou as ideias geradas pela IA.

        </p>

        <input
            type="file"
            id="novaImagem"
            accept="image/*"
        >

        <textarea
            id="novoTexto"
            placeholder="Conte sua experiência..."
        ></textarea>

        <button
            onclick="publicar()"
        >

            Publicar

        </button>

    </section>

    <!-- ==========================
            FEED
    =========================== -->

    <section class="feed-title">

        <h2>

            🌎 Feed da Comunidade

        </h2>

        <p>

            Inspire-se com outras pessoas.

        </p>

    </section>

    <div id="feed"></div>

</main>

<script src="js/feed.js"></script>

<script>

mostrarUsuario();

</script>

</body>

</html>
