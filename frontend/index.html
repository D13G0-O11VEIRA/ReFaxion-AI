<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ReFaxion</title>

    <link rel="icon" href="assets/logo.png">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/auth.js"></script>

    <script>

        verificarLogin();

    </script>

</head>

<body>

<header class="topbar">

    <div class="logo-area">

        <img
            src="assets/logo.png"
            class="logo-top"
            alt="Logo ReFaxion"
        >

    </div>

    <div class="topbar-right">

        <span id="usuarioNome"></span>

        <button
            class="community-btn"
            onclick="window.location.href='feed.html'"
        >

            🌎 Comunidade

        </button>

        <button
            class="logout-btn"
            onclick="logout()"
        >

            🚪 Sair

        </button>

    </div>

</header>

<div class="container">

    <h1>

        Bem-vindo ao ReFaxion

    </h1>

    <p id="boasVindas"></p>

    <p>

        Transforme roupas esquecidas em novas possibilidades utilizando Inteligência Artificial.

    </p>

    <input
        type="file"
        id="imagem"
        accept="image/*"
    >

    <!-- Preview da imagem -->

    <img
        id="previewImagem"
        alt="Pré-visualização da roupa"
        style="
            display:none;
            width:100%;
            max-height:450px;
            object-fit:contain;
            margin-top:20px;
            border-radius:15px;
            border:1px solid #dbdbdb;
        "
    >

    <textarea
        id="descricao"
        placeholder="Informações adicionais sobre a roupa (opcional)"
    ></textarea>

    <button
        id="analisarBtn"
        class="primary-btn"
    >

        🔍 Analisar Roupa

    </button>

    <div id="loading"></div>

    <div id="resultado"></div>

    <!-- Aparece somente após a análise -->

    <div
        id="acoesAnalise"
        style="display:none;"
    >

        <button
            id="compartilharBtn"
            class="secondary-btn"
        >

            🌎 Compartilhar na Comunidade

        </button>

    </div>

</div>

<script src="js/script.js"></script>

<script>

    mostrarUsuario();

    const usuario = obterUsuarioLogado();

    if(usuario){

        document
        .getElementById("boasVindas")
        .innerHTML =
        `Olá, <strong>${usuario.nome}</strong> 👋`;

    }

</script>

</body>

</html>
