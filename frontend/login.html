<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | ReFaxion</title>

    <link rel="icon" href="assets/logo.png">

    <link rel="stylesheet" href="css/login.css">

    <script src="js/auth.js" defer></script>

</head>

<body>

<div class="background">

    <div class="login-card">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Logo ReFaxion"
        >

        <h1>Bem-vindo!</h1>

        <p>

            Faça login para acessar a plataforma.

        </p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">

                Entrar

            </button>

        </form>

        <div class="links">

            <p>

                Ainda não possui uma conta?

            </p>

            <a href="cadastro.html">

                Criar conta

            </a>

        </div>

    </div>

</div>

<script src="js/auth.js" defer></script>

<script defer>

redirecionarSeLogado();

</script>

</body>

</html>
